default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  primary: &primary_development
    <<: *default
    database: compliance_development
    username: UB
    password: postgres42
    host: localhost

  queue:
    <<: *primary_development
    database: compliance_development_queue
    migrations_paths: db/queue_migrate

  cache:
    <<: *primary_development
    database: compliance_development_cache
    migrations_paths: db/cache_migrate

  cable:
    <<: *primary_development
    database: compliance_development_cable
    migrations_paths: db/cable_migrate

production:
  primary: &primary_production
    <<: *default
    database: <%= ENV.fetch("DB_NAME", "compliance_production") %>
    username: <%= ENV.fetch("DB_USERNAME", "compliance") %>
    password: <%= ENV.fetch("DB_PASSWORD", "compliance") %>
    host: <%= ENV.fetch("DB_HOST", "localhost") %>
    port: <%= ENV.fetch("DB_PORT", "5432") %>

  queue:
    <<: *primary_production
    database: <%= ENV.fetch("QUEUE_DB_NAME", "compliance_production_queue") %>
    migrations_paths: db/queue_migrate

  cache:
    <<: *primary_production
    database: <%= ENV.fetch("CACHE_DB_NAME", "compliance_production_cache") %>
    migrations_paths: db/cache_migrate

  cable:
    <<: *primary_production
    database: <%= ENV.fetch("CABLE_DB_NAME", "compliance_production_cable") %>
    migrations_paths: db/cable_migrate
