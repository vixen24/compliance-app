default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  primary: &primary_development
    <<: *default
    database: compliance_development
    username: UB
    password: postgres42
    host: localhost

  queue:
    <<: *primary_development
    database: compliance_development_queue
    migrations_paths: db/queue_migrate

  cache:
    <<: *primary_development
    database: compliance_development_cache
    migrations_paths: db/cache_migrate

  cable:
    <<: *primary_development
    database: compliance_development_cable
    migrations_paths: db/cable_migrate

production:
  primary: &primary_production
    <<: *default
    database: compliance_production
    username: deploy
    password: choose_a_strong_password
    host: 172.17.0.1
    port: 5432

  queue:
    <<: *primary_production
    database: compliance_production_queue
    migrations_paths: db/queue_migrate

  cache:
    <<: *primary_production
    database: compliance_production_cache
    migrations_paths: db/cache_migrate

  cable:
    <<: *primary_production
    database: compliance_production_cable
    migrations_paths: db/cable_migrate
